<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Categoría | LoanWare</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="publico.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <h1>Loan<span>Ware</span></h1>
            </div>
            <div class="main-nav">
                <a href="perfil.html" class="btn-login">MI PERFIL</a>
            </div>
        </div>
    </header>

    <main class="container seccion-about">
        <div class="about-text" style="text-align: center; margin-bottom: 40px;">
            <span class="tag">Configuración de Catálogo</span>
            <h2 id="tituloPrincipal">Nueva <span style="color: var(--text-muted);">Categoría</span></h2>
            <p id="subtituloPrincipal" style="color: var(--text-muted); margin-bottom: 30px;">
                Crea una nueva clasificación para organizar los equipos.
            </p>
        </div>

        <div style="max-width: 550px; margin: 0 auto;">
            <div class="card" style="padding: 40px; border-top: 4px solid var(--accent);">
                <form id="formCategoria">
                    <input type="hidden" id="idCategoria">

                    <div style="margin-bottom: 25px; text-align: left;">
                        <label for="nombreCategoria" style="display: block; font-weight: 700; color: var(--primary); margin-bottom: 12px; font-size: 0.85rem; text-transform: uppercase;">
                            Nombre de la Categoría
                        </label>
                        <div style="position: relative;">
                            <i class="fas fa-folder" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 1.1rem;"></i>
                            <input type="text" id="nombreCategoria" name="nombreCategoria" placeholder="Ej: Laptops, Proyectores, Audio..." 
                                style="width: 100%; padding: 15px 15px 15px 45px; border-radius: 12px; border: 2px solid #edf2f7; font-family: inherit; font-size: 1rem; outline: none; transition: all 0.3s;"
                                required>
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <button type="submit" id="btnGuardar" class="btn-primary" style="flex: 2; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px;">
                            <i class="fas fa-save"></i> <span id="textoBoton">GUARDAR CATEGORÍA</span>
                        </button>
                        <a href="categoria.html" class="btn-secondary" style="flex: 1; text-align: center; border: 2px solid #e2e8f0; color: var(--text-muted); display: flex; align-items: center; justify-content: center; text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 0.8rem; transition: all 0.3s;">
                            CANCELAR
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="js/categoria.js"></script>
</body>
</html>
