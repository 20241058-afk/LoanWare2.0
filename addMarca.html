<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Marca | LoanWare</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="publico.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <h1>Loan<span>Ware</span></h1>
            </div>
            <div class="main-nav">
                <span style="color:white; margin-right: 15px; font-size: 0.8rem; font-weight: 600;">
                    <i class="fas fa-user-shield" style="color: var(--accent);"></i> MODO ADMINISTRADOR
                </span>
                <a href="perfil.html" class="btn-login">MI PERFIL</a>
            </div>
        </div>
    </header>

    <nav class="header" style="background-color: var(--primary); border-top: 1px solid rgba(255,255,255,0.1); padding: 5px 0;">
        <div class="header-container main-nav">
            <a href="adminDashboard.html">Inicio</a>
            <a href="inventario.html">Inventario</a>
            <a href="historial.html">Solicitudes</a>
            <a href="usuario.html">Usuarios</a>
            <div class="dropdown" style="display: inline-block; position: relative;">
                <a href="#" class="dropbtn">Catalogos <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i></a>
                <div class="dropdown-content">
                    <a href="marca.html"><i class="fas fa-arrow-up" style="color: var(--accent); margin-right: 10px;"></i> Marca</a>
                    <a href="categoria.html"><i class="fas fa-arrow-down" style="color: var(--accent); margin-right: 10px;"></i> Categoría</a>
                </div>
            </div>
            <a href="ajustes_footer.html"><i class="fas fa-cog"></i> Ajustes</a>
        </div>
    </nav>  

    <main class="container seccion-about">
        <div class="about-text" style="text-align: center; margin-bottom: 40px;">
            <span class="tag">Configuración de Catálogo</span>
            <h2 id="tituloPrincipal">Nueva <span style="color: var(--text-muted);">Marca</span></h2>
            <p id="subtituloPrincipal" style="color: var(--text-muted); margin-bottom: 30px;">
                Registra un nuevo fabricante para organizar mejor el inventario.
            </p>
        </div>

        <div style="max-width: 550px; margin: 0 auto;">
            <div class="card" style="padding: 40px; border-top: 4px solid var(--accent);">
                <form id="formMarca">
                    <input type="hidden" id="idMarca">

                    <div style="margin-bottom: 25px; text-align: left;">
                        <label for="nombreMarca" style="display: block; font-weight: 700; color: var(--primary); margin-bottom: 12px; font-size: 0.85rem; text-transform: uppercase;">
                            Nombre de la Marca
                        </label>
                        <div style="position: relative;">
                            <i class="fas fa-tag" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 1.1rem;"></i>
                            <input type="text" id="nombreMarca" name="nombreMarca" placeholder="Ej: Lenovo, Apple, HP..." 
                                style="width: 100%; padding: 15px 15px 15px 45px; border-radius: 12px; border: 2px solid #edf2f7; font-family: inherit; font-size: 1rem; outline: none; transition: all 0.3s;"
                                required>
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 10px;">
                        <button type="submit" id="btnGuardar" class="btn-primary" style="flex: 2; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px;">
                            <i class="fas fa-save"></i> <span id="textoBoton">GUARDAR MARCA</span>
                        </button>
                        <a href="marca.html" class="btn-secondary" style="flex: 1; text-align: center; border: 2px solid #e2e8f0; color: var(--text-muted); display: flex; align-items: center; justify-content: center; text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 0.8rem; transition: all 0.3s;">
                            CANCELAR
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <style>
        /* Estilos específicos para mejorar la experiencia del formulario */
        #nombreMarca:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 4px rgba(132, 204, 22, 0.1);
        }
        .btn-secondary:hover {
            background-color: #f8fafc;
            border-color: var(--primary);
            color: var(--primary) !important;
        }
    </style>
    <script src="js/marca.js"></script>
</body>
</html>
